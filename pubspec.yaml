name: sonah
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  adhan: ^2.0.0+1
  battery_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  external_app_launcher: ^4.0.3
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_device_apps: ^0.7.0
  flutter_localizations:
    sdk: flutter
  hijri: ^3.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  lucide_icons_flutter: ^3.1.14
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: MiSans
      fonts:
        - asset: assets/fonts/mi.ttf
    - family: kage
      fonts:
        - asset: assets/fonts/kage_demi_bold.ttf
          weight: 700
        - asset: assets/fonts/kage_semi_bold.ttf
          weight: 600
        - asset: assets/fonts/kage_extra_light.ttf
          weight: 200

flutter_native_splash:
  color: "#161618"
  image: assets/icon_white.png
  android_12:
    image: assets/icon_white.png
    color: "#161618"

flutter_intl:
  enabled: true
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"
  adaptive_icon_monochrome: "assets/icon.png"
  remove_alpha_ios: true

  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"

  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48

  linux:
    generate: true
    image_path: "assets/icon.png"
